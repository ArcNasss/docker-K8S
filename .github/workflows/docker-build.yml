name: Docker Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-laravel-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
  run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/docker-k8s-laravel-app" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} -f docker/php/Dockerfile .

      - name: Push Docker image latest
        if: github.event_name == 'push'
        run: docker push $IMAGE_NAME:latest

      - name: Push Docker image commit sha
        if: github.event_name == 'push'
        run: docker push $IMAGE_NAME:${{ github.sha }}

      - name: List Docker images
        run: docker images
