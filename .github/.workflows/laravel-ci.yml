name: Laravel CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  laravel-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, mysql, pdo, pdo_mysql, sqlite, pdo_sqlite, gd, zip, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Configure SQLite database
        run: |
          touch database/database.sqlite
          php -r "file_put_contents('.env', preg_replace('/DB_CONNECTION=.*/', 'DB_CONNECTION=sqlite', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/DB_DATABASE=.*/', 'DB_DATABASE=' . getcwd() . '/database/database.sqlite', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/CACHE_STORE=.*/', 'CACHE_STORE=file', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/SESSION_DRIVER=.*/', 'SESSION_DRIVER=file', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/QUEUE_CONNECTION=.*/', 'QUEUE_CONNECTION=sync', file_get_contents('.env')));"

      - name: Generate application key
        run: php artisan key:generate

      - name: Clear Laravel cache
        run: php artisan optimize:clear

      - name: Run migrations
        run: php artisan migrate --force

      - name: List routes
        run: php artisan route:list

      - name: Run tests
        run: php artisan test
