services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name:  cms_builder_app
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - cms_builder_network

    nginx:
        image: nginx:alpine
        container_name: cms_builder_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - cms_builder_network

    mysql:
        image: mysql:8.0
        container_name: cms_builder_mysql
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: cms_builder
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
        ports:
            - "3307:3306"
        volumes:
            - cms_builder_mysql_data:/var/lib/mysql
        networks:
            - cms_builder_network


    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: cms_builder_phpmyadmin
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
        depends_on:
            - mysql
        ports:
            - "8081:80"
        networks:
            - cms_builder_network


networks:
    cms_builder_network:

volumes:
    cms_builder_mysql_data:
